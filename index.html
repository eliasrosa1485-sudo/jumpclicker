<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jump Clicker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: black;
}

#ui {
    position: fixed;
    width: 100%;
    top: 10px;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    color: white;
    font-size: 20px;
}
</style>
</head>

<body>

<div id="ui">
    <div id="coins">💰 0</div>
    <div id="meters">0 m</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let y = canvas.height - 200;
let velocity = 0;
let gravity = 0.5;

let cameraY = 0;
let meters = 0;
let coins = 0;

let stars = [];
for (let i = 0; i < 100; i++) {
    stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*5000,
        size: Math.random()*2
    });
}

// controle
window.addEventListener("mousedown", ()=> velocity = -18);
window.addEventListener("touchstart", ()=> velocity = -18);

// stickman
function drawStickman(x, y) {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.arc(x, y - 30, 15, 0, Math.PI*2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, y - 15);
    ctx.lineTo(x, y + 25);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x - 20, y);
    ctx.lineTo(x + 20, y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, y + 25);
    ctx.lineTo(x - 15, y + 45);
    ctx.moveTo(x, y + 25);
    ctx.lineTo(x + 15, y + 45);
    ctx.stroke();
}

// loop
function update() {

    velocity += gravity;
    y += velocity;

    if (y > canvas.height - 200) {
        y = canvas.height - 200;
        velocity = -18;
    }

    meters += Math.abs(velocity * 4);

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // câmera suave
    cameraY += (y - canvas.height/2 - cameraY) * 0.08;
    ctx.setTransform(1,0,0,1,0,-cameraY);

    // céu → espaço
    let gradient = ctx.createLinearGradient(0, cameraY, 0, cameraY + canvas.height);
    gradient.addColorStop(0, "black");
    gradient.addColorStop(1, "#4da6ff");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, cameraY, canvas.width, canvas.height);

    // estrelas
    if (meters > 20000) {
        ctx.fillStyle = "white";
        stars.forEach(s => {
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
    }

    // nuvens
    if (meters < 20000) {
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, cameraY + Math.random()*canvas.height, 30, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // sol final
    if (meters > 80000) {
        ctx.fillStyle = "orange";
        ctx.beginPath();
        ctx.arc(canvas.width/2, cameraY + 150, 120, 0, Math.PI*2);
        ctx.fill();
    }

    // chão / trampolim
    ctx.fillStyle = "#00ccff";
    ctx.fillRect(canvas.width/2 - 120, canvas.height - 100 + cameraY, 240, 20);

    drawStickman(canvas.width/2, y);

    ctx.setTransform(1,0,0,1,0,0);

    document.getElementById("meters").innerText = Math.floor(meters) + " m";
    document.getElementById("coins").innerText = "💰 " + coins;
}

update();
</script>

</body>
</html>
