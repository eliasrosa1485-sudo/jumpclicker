<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jump Clicker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial;}

#ui {
 position:fixed;
 width:100%;
 top:10px;
 display:flex;
 justify-content:space-between;
 padding:0 20px;
 color:white;
}

.button {
 position:fixed;
 padding:12px;
 border-radius:12px;
 background:linear-gradient(45deg, orange, red);
 color:white;
 font-weight:bold;
}

#shopBtn { bottom:10px; left:10px; }
#skinBtn { bottom:10px; right:10px; }

#shop, #skins {
 position:fixed;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 background:#111;
 padding:20px;
 border-radius:15px;
 display:none;
 color:white;
 text-align:center;
}

button {
 padding:10px;
 margin:5px;
 border:none;
 border-radius:10px;
 background:lime;
}
</style>
</head>

<body>

<div id="ui">
 <div id="coins">💰 0</div>
 <div id="meters">0 m</div>
</div>

<div id="shopBtn" class="button" onclick="toggleShop()">🛒</div>
<div id="skinBtn" class="button" onclick="toggleSkins()">🎭</div>

<div id="shop">
 <h2>LOJA</h2>
 <button onclick="upgradeJump()">💪 Pulo + (50)</button><br>
 <button onclick="toggleShop()">Fechar</button>
</div>

<div id="skins">
 <h2>SKINS</h2>
 <button onclick="setSkin('white')">Branco</button>
 <button onclick="setSkin('red')">Vermelho</button>
 <button onclick="setSkin('green')">Verde</button><br>
 <button onclick="toggleSkins()">Fechar</button>
</div>

<canvas id="game"></canvas>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let y = canvas.height - 200;
let velocity = 0;
let gravity = 0.4;

let jumpForce = -15;
let cameraY = 0;
let highestY = y;

let meters = 0;
let coins = 0;

let skin = "white";

// música
document.body.addEventListener("click", ()=>{
 document.getElementById("music").play();
}, {once:true});

// loja
function toggleShop(){
 let el = document.getElementById("shop");
 el.style.display = el.style.display==="none"?"block":"none";
}

function upgradeJump(){
 if(coins>=50){
   coins-=50;
   jumpForce-=2;
 } else alert("Sem moedas!");
}

// skins
function toggleSkins(){
 let el = document.getElementById("skins");
 el.style.display = el.style.display==="none"?"block":"none";
}

function setSkin(color){
 skin = color;
}

// controle mobile
window.addEventListener("touchstart", ()=> velocity = jumpForce);
window.addEventListener("mousedown", ()=> velocity = jumpForce);

// stickman
function drawStickman(x,y){
 ctx.strokeStyle=skin;
 ctx.lineWidth=4;

 ctx.beginPath();
 ctx.arc(x,y-30,15,0,Math.PI*2);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(x,y-15);
 ctx.lineTo(x,y+25);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(x-20,y);
 ctx.lineTo(x+20,y);
 ctx.stroke();

 ctx.beginPath();
 ctx.moveTo(x,y+25);
 ctx.lineTo(x-15,y+45);
 ctx.moveTo(x,y+25);
 ctx.lineTo(x+15,y+45);
 ctx.stroke();
}

// loop
function update(){

 velocity += gravity;
 y += velocity;

 if(y > canvas.height-200){
   y = canvas.height-200;
   velocity = -12;
   coins += 20;
 }

 if(y < highestY){
   highestY = y;
   meters = Math.floor((canvas.height - highestY) * 2);
   coins += 1;
 }

 draw();
 requestAnimationFrame(update);
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 cameraY += ((y - canvas.height/2) - cameraY)*0.08;
 ctx.setTransform(1,0,0,1,0,-cameraY);

 let g = ctx.createLinearGradient(0,cameraY,0,cameraY+canvas.height);
 g.addColorStop(0,"black");
 g.addColorStop(1,"#1e90ff");
 ctx.fillStyle=g;
 ctx.fillRect(0,cameraY,canvas.width,canvas.height);

 ctx.fillStyle="#00ccff";
 ctx.fillRect(canvas.width/2-120, canvas.height-100 + cameraY,240,20);

 drawStickman(canvas.width/2,y);

 ctx.setTransform(1,0,0,1,0,0);

 document.getElementById("meters").innerText = meters + " m";
 document.getElementById("coins").innerText = "💰 " + coins;
}

update();
</script>

</body>
</html>
